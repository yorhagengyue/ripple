<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in — Ripple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/colors_and_type.css?v=vermilion3">
<link rel="stylesheet" href="./shared.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .auth-card {
    width: 100%; max-width: 420px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(26,26,26,0.10);
    border-radius: 28px;
    padding: clamp(28px, 4vw, 44px);
    box-shadow: 0 24px 60px rgba(61,43,30,0.08);
    backdrop-filter: blur(14px);
  }
  .auth-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: #c8472d; margin: 0 0 14px; }
  .auth-card h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-size: clamp(34px, 5vw, 46px); line-height: 1.0; letter-spacing: -0.02em; color: #1a1a1a; margin: 0 0 8px; }
  .auth-card h1 em { font-style: italic; color: #c8472d; }
  .auth-sub { font-family: 'Manrope', sans-serif; font-size: 15px; line-height: 1.5; color: rgba(26,26,26,0.64); margin: 0 0 26px; }
  .auth-field { display: block; width: 100%; box-sizing: border-box; font-family: 'Manrope', sans-serif; font-size: 16px; padding: 14px 16px; margin: 0 0 12px; border: 1px solid rgba(26,26,26,0.16); border-radius: 14px; background: #fff; color: #1a1a1a; }
  .auth-field:focus { outline: none; border-color: #c8472d; }
  .auth-btn { width: 100%; box-sizing: border-box; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 16px; padding: 14px 16px; border: none; border-radius: 999px; background: #c8472d; color: #fff; cursor: pointer; transition: transform .12s, background .12s; }
  .auth-btn:hover { transform: translateY(-1px); background: #b03c25; }
  .auth-btn:disabled { opacity: .55; cursor: default; transform: none; }
  .auth-msg { font-family: 'Manrope', sans-serif; font-size: 13.5px; line-height: 1.45; margin: 14px 2px 0; min-height: 18px; }
  .auth-msg.err { color: #b03c25; }
  .auth-msg.ok { color: #1a7a4a; }
  .auth-back { display: inline-block; margin-top: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.12em; color: rgba(26,26,26,0.5); text-decoration: none; }
  .auth-back:hover { color: #c8472d; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="rail rail--left"><span>RIPPLE // WELLNESS · SINGAPORE ——</span></div>
<div class="rail rail--right"><span>NAISC 2026 / SENSE · THINK · ACT · CONVERSE</span></div>

<main class="auth-card">
  <p class="auth-eyebrow">// Ripple</p>
  <h1>Sign <em>in</em></h1>
  <p class="auth-sub">Enter your email — we'll send a 6-digit code. New here? The same step creates your account.</p>

  <form id="emailForm">
    <input class="auth-field" id="email" type="email" autocomplete="email" placeholder="you@email.com" required>
    <button class="auth-btn" id="emailBtn" type="submit">Send code</button>
  </form>

  <form id="codeForm" hidden>
    <input class="auth-field" id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code" required>
    <button class="auth-btn" id="codeBtn" type="submit">Verify &amp; sign in</button>
  </form>

  <p class="auth-msg" id="msg"></p>
  <a class="auth-back" href="/">← back to Ripple</a>
</main>

<script type="module">
  import { sendOtp, verifyOtp, getSession } from './auth.js';

  const $ = (id) => document.getElementById(id);
  const msg = $('msg');
  const next = new URLSearchParams(location.search).get('next') || '/';
  const setMsg = (t, cls = '') => { msg.textContent = t; msg.className = 'auth-msg ' + cls; };

  // Already signed in → bounce to the app.
  getSession().then((s) => { if (s) location.replace(next); });

  let email = '';
  $('emailForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    email = $('email').value.trim();
    if (!email) return;
    $('emailBtn').disabled = true;
    setMsg('Sending code…');
    const { error } = await sendOtp(email);
    $('emailBtn').disabled = false;
    if (error) { setMsg(error.message || 'Could not send code', 'err'); return; }
    $('emailForm').hidden = true;
    $('codeForm').hidden = false;
    setMsg(`Code sent to ${email}. Check your inbox.`, 'ok');
    $('code').focus();
  });

  $('codeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = $('code').value.trim();
    if (!token) return;
    $('codeBtn').disabled = true;
    setMsg('Verifying…');
    const { error } = await verifyOtp(email, token);
    $('codeBtn').disabled = false;
    if (error) { setMsg(error.message || 'Invalid code', 'err'); return; }
    setMsg('Signed in. Redirecting…', 'ok');
    location.replace(next);
  });
</script>
</body>
</html>
