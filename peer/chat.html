<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>心涟 · 对话</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="./shared.css">
<style>
  /* Chat is a fixed-height app, override body scroll lock */
  html, body { height: 100vh; overflow: hidden; }
</style>
</head>
<body>

<div class="chat-shell">
  <header class="chat-topbar">
    <a class="back" href="/peer">← 返回</a>
    <span class="title" id="title">载入…</span>
    <span class="live" id="live">实时</span>
  </header>

  <div class="chat-feed" id="feed"><div class="loading">载入对话…</div></div>

  <div class="chat-footer">
    <label><input type="checkbox" id="raw"> 显示 tool</label>
    <label><input type="checkbox" id="autoscroll" checked> 自动滚到底</label>
    <span class="stat" id="stat"></span>
  </div>

  <div class="composer">
    <div class="label">
      <span>以 bot 身份注入（人类校准）</span>
      <span class="hint">注入后心涟会把这段当自己说过的</span>
    </div>
    <textarea id="compose" placeholder="替心涟说一句..."></textarea>
    <div class="row">
      <span class="status" id="compose-status"></span>
      <button class="btn" id="compose-send">发出</button>
    </div>
  </div>
</div>

<script type="module">
import {
  $, checkAuth, fetchProfiles, fetchMessages,
  escapeHtml, fmtTime, cleanContent,
} from './shared.js';

const params = new URLSearchParams(window.location.search);
let profile = params.get('profile') || '';
if (!profile) {
  const m = window.location.pathname.match(/\/peer\/u\/([^/]+)/);
  if (m) profile = m[1];
}
profile = profile.replace(/[^a-z0-9_-]/gi, '');
if (!profile) {
  document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#999;">profile 缺失。<a href="/peer">返回</a></div>';
}

let lastSourceId = 0;
const renderedSourceIds = new Set();
let lastDate = null;
let messageCount = 0;
let chatId = null;

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('zh-CN');
}

async function loadProfile() {
  const profiles = await fetchProfiles();
  if (!profiles) return;
  const p = profiles.find((x) => x.profile === profile);
  if (p) {
    document.title = `${p.display_name} · 心涟`;
    $('#title').innerHTML = `${escapeHtml(p.avatar || '👤')} ${escapeHtml(p.display_name)}`;
    chatId = p.chat_id || null;
  }
}

async function intervene() {
  const text = $('#compose').value;
  const status = $('#compose-status');
  if (!text.trim()) {
    status.textContent = '空消息';
    status.className = 'status error';
    return;
  }
  if (!chatId) {
    status.textContent = '没有 chat_id（profile_meta 缺）';
    status.className = 'status error';
    return;
  }
  $('#compose-send').disabled = true;
  status.textContent = '发送中...';
  status.className = 'status';
  try {
    const r = await fetch('/api/peer?action=intervene', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile, chat_id: chatId, message: text }),
    });
    const j = await r.json().catch(() => ({}));
    if (r.status === 202 && j.queued) {
      $('#compose').value = '';
      status.textContent = `已排队 (id=${j.id})，~3 秒后到达`;
      status.className = 'status ok';
    } else {
      status.textContent = j.error || `失败 ${r.status}`;
      status.className = 'status error';
    }
  } catch (e) {
    status.textContent = '网络错误：' + (e.message || e);
    status.className = 'status error';
  } finally {
    $('#compose-send').disabled = false;
  }
}

function renderMsg(m, raw) {
  const c = cleanContent(m.content, m.role);
  if (c === null) return null;
  if (!c.trim() && m.role !== 'tool') return null;

  const date = fmtDate(m.ts);
  const out = [];
  if (date !== lastDate) {
    out.push(`<div class="date-divider">${date}</div>`);
    lastDate = date;
  }

  if (m.role === 'tool' && raw) {
    const tn = m.tool_name || 'tool';
    const truncated = c.length > 200 ? c.slice(0, 200) + '…' : c;
    out.push(`<div class="msg tool">[${escapeHtml(tn)}] ${escapeHtml(truncated)}</div>`);
  } else if (m.role === 'tool') {
    return null;
  } else {
    out.push(`
      <div class="msg ${m.role}">
        ${escapeHtml(c)}
        <div class="ts">${fmtTime(m.ts)}</div>
      </div>
    `);
  }
  return out.join('');
}

async function pull() {
  if (!profile) return;
  try {
    const raw = $('#raw').checked;
    const messages = await fetchMessages(profile, lastSourceId, raw);
    if (!messages || messages.length === 0) return;

    const feed = $('#feed');
    if (feed.querySelector('.loading')) feed.innerHTML = '';

    let added = 0;
    for (const m of messages) {
      if (renderedSourceIds.has(m.source_id)) continue;
      const html = renderMsg(m, raw);
      if (html) {
        feed.insertAdjacentHTML('beforeend', html);
        added++;
      }
      renderedSourceIds.add(m.source_id);
      lastSourceId = Math.max(lastSourceId, m.source_id);
      messageCount++;
    }

    if (added > 0 && $('#autoscroll').checked) {
      feed.scrollTop = feed.scrollHeight;
    }
    $('#stat').textContent = `${messageCount} 条`;
  } catch (e) {
    console.error('pull error', e);
  }
}

function clearAndReload() {
  lastSourceId = 0;
  renderedSourceIds.clear();
  lastDate = null;
  messageCount = 0;
  $('#feed').innerHTML = '<div class="loading">载入对话…</div>';
  pull();
}

// Boot
(async () => {
  if (!profile) return;
  if (!await checkAuth()) { window.location.href = '/peer'; return; }
  await loadProfile();
  await pull();
  setInterval(pull, 2000);

  $('#raw').addEventListener('change', clearAndReload);
  $('#compose-send').addEventListener('click', intervene);
  $('#compose').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      intervene();
    }
  });
})();
</script>

</body>
</html>
