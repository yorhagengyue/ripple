<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>心涟 · Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="./shared.css">
<style>
  /* Filter chip row */
  .filter-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px; align-items: center;
  }
  .chip {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--y-fg-muted);
    background: var(--y-surface-strong);
    border: 1px solid var(--y-line);
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 140ms, background 140ms, border-color 140ms;
  }
  .chip:hover { color: var(--y-fg); border-color: var(--y-line-strong); }
  .chip.on {
    background: var(--y-fg);
    color: var(--y-bg);
    border-color: var(--y-fg);
  }
  .day-head {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--y-fg-muted);
    margin: 28px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--y-line);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .day-head .count { color: var(--y-accent); font-weight: 600; }
</style>
</head>
<body>

<div id="peer-nav-mount"></div>

<main class="shell">
  <div class="page-head">
    <div>
      <div class="eyebrow"><span class="slash">//</span> 02 / Timeline · 跨 profile 事件流</div>
      <h1>所有人，<em>按时间顺序</em>。</h1>
      <p class="sub">把每个 profile 的对话压平到一条时间线。看节奏、看谁在什么时候活跃、看心涟回得快不快。</p>
    </div>
    <div class="meta">
      <span class="live">LIVE · 10s 轮询</span><br>
      <b id="last-refresh">载入中…</b>
    </div>
  </div>

  <div class="filter-row" id="filter-row">
    <span class="tag accent" id="event-count">—</span>
    <span class="muted" style="font-family:var(--mono);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;margin-left:8px;">按 profile 过滤</span>
    <button class="chip on" data-profile="__all__">全部</button>
  </div>

  <div id="timeline-host">
    <div class="loading">载入事件…</div>
  </div>
</main>

<script type="module">
import {
  $, $$, checkAuth, fetchProfiles, fetchMessages,
  escapeHtml, fmtTime, fmtDateLong, cleanContent, mountNav, mountRails,
} from './shared.js';

let allMessages = [];
let allProfiles = [];
let activeProfile = '__all__';

function renderFilter(profiles) {
  const row = $('#filter-row');
  // Remove existing profile chips except "all"
  $$('.chip', row).forEach((c) => {
    if (c.dataset.profile !== '__all__') c.remove();
  });
  for (const p of profiles) {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.dataset.profile = p.profile;
    chip.textContent = `${p.avatar || '·'} ${p.display_name}`;
    chip.addEventListener('click', () => {
      activeProfile = p.profile;
      $$('.chip', row).forEach((c) => c.classList.toggle('on', c.dataset.profile === activeProfile));
      renderTimeline();
    });
    row.appendChild(chip);
  }
  $('.chip[data-profile="__all__"]').addEventListener('click', () => {
    activeProfile = '__all__';
    $$('.chip', row).forEach((c) => c.classList.toggle('on', c.dataset.profile === activeProfile));
    renderTimeline();
  });
}

function nameOf(slug) {
  const p = allProfiles.find((x) => x.profile === slug);
  return p ? p.display_name : slug;
}
function avatarOf(slug) {
  const p = allProfiles.find((x) => x.profile === slug);
  return p ? (p.avatar || '·') : '·';
}

function renderTimeline() {
  const host = $('#timeline-host');
  const filtered = allMessages
    .filter((m) => m.role === 'user' || m.role === 'assistant')
    .filter((m) => activeProfile === '__all__' || m.profile === activeProfile)
    .sort((a, b) => new Date(b.ts) - new Date(a.ts))
    .slice(0, 300);

  $('#event-count').textContent = `${filtered.length} 条事件`;

  if (filtered.length === 0) {
    host.innerHTML = '<div class="empty">这个 profile 还没有事件</div>';
    return;
  }

  // Group by date.
  const groups = new Map();
  for (const m of filtered) {
    const d = fmtDateLong(m.ts);
    if (!groups.has(d)) groups.set(d, []);
    groups.get(d).push(m);
  }

  const out = [];
  for (const [date, items] of groups) {
    out.push(`
      <div class="day-head">
        <span>${escapeHtml(date)}</span>
        <span><span class="count">${items.length}</span> 条</span>
      </div>
      <div class="timeline">
        ${items.map((m) => {
          const c = cleanContent(m.content, m.role) || '';
          const text = c.length > 180 ? c.slice(0, 180) + '…' : c;
          const who = m.role === 'user'
            ? `${avatarOf(m.profile)} ${nameOf(m.profile)}`
            : `🌊 心涟 → ${nameOf(m.profile)}`;
          const roleTag = m.role === 'user' ? '收' : '发';
          return `
            <div class="tl-item ${m.role}">
              <span class="tl-time">${fmtTime(m.ts)}</span>
              <div class="tl-content">
                <span class="who">${escapeHtml(who)}</span>
                ${escapeHtml(text || '[空]')}
              </div>
              <span class="tl-meta">${roleTag}</span>
            </div>`;
        }).join('')}
      </div>`);
  }
  host.innerHTML = out.join('');
}

async function refresh() {
  try {
    const profiles = await fetchProfiles();
    if (!profiles) return;
    allProfiles = profiles;
    if ($$('.chip', $('#filter-row')).length <= 1) renderFilter(profiles);

    const all = [];
    await Promise.all(profiles.map(async (p) => {
      try {
        const msgs = await fetchMessages(p.profile, 0, false);
        if (msgs) {
          for (const m of msgs) all.push({ ...m, profile: p.profile });
        }
      } catch {}
    }));
    allMessages = all;
    renderTimeline();
    $('#last-refresh').textContent = '更新 · ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });
  } catch (e) {
    console.error(e);
    $('#last-refresh').textContent = '更新失败';
  }
}

(async () => {
  if (!await checkAuth()) { window.location.href = '/peer'; return; }
  mountRails();
  mountNav('/peer/timeline');
  await refresh();
  setInterval(refresh, 10000);
})();
</script>

</body>
</html>
